<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07080b" />
  <title>目前離線中 | ABAO</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080b;
      --surface: rgba(15, 18, 23, 0.86);
      --text: #f5f8fb;
      --muted: #a8b2bd;
      --accent: #5ff3ff;
      --accent-2: #98ff63;
      --line: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Noto Sans TC", system-ui, sans-serif;
      color: var(--text);
      background:
        repeating-linear-gradient(90deg, rgba(95, 243, 255, 0.08) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(95, 243, 255, 0.05) 0 1px, transparent 1px 72px),
        linear-gradient(135deg, rgba(95, 243, 255, 0.1), transparent 34%),
        linear-gradient(180deg, #07080b 0%, #050608 100%);
      line-height: 1.7;
    }

    main {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Outfit", system-ui, sans-serif;
      font-size: 2.6rem;
      line-height: 1.05;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 10px;
      padding: 0 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041013;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      main {
        padding: 24px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>目前沒有網路連線</h1>
    <p>你正在查看離線頁面。已快取的首頁、文章與靜態資源仍可使用，其餘即時內容會在重新連線後恢復。</p>
    <p>如果你剛回到線上，重新整理頁面即可載入最新版本。</p>
    <a href="/">回到首頁</a>
  </main>
</body>
</html>
