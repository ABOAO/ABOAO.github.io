<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f74354" />
  <title>目前離線中 | ABAO</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #dfe7ee;
      --surface: rgba(255, 255, 255, 0.84);
      --text: #222;
      --muted: #5d6671;
      --accent: #f74354;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(110, 150, 194, 0.28), transparent 24%),
        radial-gradient(circle at bottom right, rgba(247, 67, 84, 0.14), transparent 24%),
        linear-gradient(180deg, #e8eef4 0%, var(--bg) 100%);
    }

    main {
      width: min(560px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: var(--surface);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(28, 44, 66, 0.16);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 10px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>目前沒有網路連線</h1>
    <p>你正在查看離線頁面。已快取的首頁、文章與靜態資源仍可使用，其餘即時內容會在重新連線後恢復。</p>
    <p>如果你剛回到線上，重新整理頁面即可載入最新版本。</p>
    <a href="/">回到首頁</a>
  </main>
</body>
</html>
